# JavaScript package manager definitions.
# Each section defines a package manager with its lockfiles, install commands, etc.
# Detected by lockfile presence; first match wins.

[bun]
lockfiles = ["bun.lockb", "bun.lock"]
add = "bun add {package}"

install = '''
bun install --production --frozen-lockfile
'''

[bun.development]
install = '''
bun install
'''

[npm]
lockfiles = ["package-lock.json"]
add = "npm install {package}"

install = '''
npm ci --omit=dev
'''

[npm.development]
install = '''
npm ci
'''

[pnpm]
lockfiles = ["pnpm-lock.yaml"]
add = "pnpm add {package}"

install = '''
pnpm install --prod --frozen-lockfile
'''

[pnpm.development]
install = '''
pnpm install --frozen-lockfile
'''

[yarn]
lockfiles = ["yarn.lock"]
add = "yarn add {package}"

install = '''
yarn install --immutable
'''

[yarn.development]
install = '''
yarn install --immutable
'''

[deno]
lockfiles = ["deno.lock"]
add = "deno add {package}"

install = '''
deno install --frozen
'''

[deno.development]
install = '''
deno install
'''
