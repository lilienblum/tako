language = "javascript"

[entrypoint]
candidates = [
  "index.ts",
  "index.tsx",
  "index.js",
  "index.jsx",
  "src/index.ts",
  "src/index.tsx",
  "src/index.js",
  "src/index.jsx",
]

[entrypoint.manifest]
file = "package.json"
field = "main"

[preset]
main = "src/index.ts"
dev = ["bun", "--hot", "{main}"]
start = ["bun", "run", "node_modules/tako.sh/src/entrypoints/bun.ts", "{main}"]
build = '''
cd "$TAKO_APP_DIR"
bun run --if-present build
'''

[server]
entrypoint_path = "node_modules/tako.sh/src/entrypoints/bun.ts"
launch_args = ["{bin}", "run", "{entrypoint}", "{main}"]

[envs.production]
NODE_ENV = "production"
BUN_ENV = "production"

[envs.development]
NODE_ENV = "development"
BUN_ENV = "development"

[download]
version_source = { type = "github_releases", repo = "oven-sh/bun", tag_prefix = "bun-v" }
url = "https://github.com/oven-sh/bun/releases/download/bun-v{version}/bun-{os}-{arch}.zip"
format = "zip"
checksum_url = "https://github.com/oven-sh/bun/releases/download/bun-v{version}/SHASUMS256.txt"
checksum_format = "shasums"

[download.os_map]
macos = "darwin"
linux = "linux"

[download.arch_map]
x64 = "x64"
arm64 = "aarch64"

[download.arch_variants]
"x64-musl" = "x64-musl"
"arm64-musl" = "aarch64-musl"

[download.extract]
binary = "bun-{os}-{arch}/bun"
strip_components = 0
symlinks = [{ name = "bunx", target = "./bun" }]
