language = "javascript"

[entrypoint]
candidates = [
  "index.ts",
  "index.tsx",
  "index.js",
  "index.jsx",
  "src/index.ts",
  "src/index.tsx",
  "src/index.js",
  "src/index.jsx",
]

[entrypoint.manifest]
file = "package.json"
field = "main"

[preset]
main = "index.js"
dev = ["node", "{main}"]
watch = ["**/*.ts", "**/*.tsx", "**/*.js", "**/*.jsx", "**/*.mts", "**/*.mjs"]
start = ["node", "--experimental-strip-types", "node_modules/tako.sh/src/entrypoints/node.ts", "{main}"]
build = '''
cd "$TAKO_APP_DIR"
npm run --if-present build
'''

[server]
entrypoint_path = "node_modules/tako.sh/src/entrypoints/node.ts"
launch_args = ["{bin}", "--experimental-strip-types", "{entrypoint}", "{main}"]

[envs.production]
NODE_ENV = "production"

[envs.development]
NODE_ENV = "development"

[download]
version_source = { type = "github_releases", repo = "nodejs/node", tag_prefix = "v" }
url = "https://nodejs.org/dist/v{version}/node-v{version}-{os}-{arch}.tar.gz"
format = "tar.gz"
checksum_url = "https://nodejs.org/dist/v{version}/SHASUMS256.txt"
checksum_format = "shasums"

[download.os_map]
macos = "darwin"
linux = "linux"

[download.arch_map]
x64 = "x64"
arm64 = "arm64"

[download.extract]
binary = "node-v{version}-{os}-{arch}/bin/node"
strip_components = 0
symlinks = [{ name = "npm", target = "./node" }, { name = "npx", target = "./node" }]
