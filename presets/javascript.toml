# JavaScript preset definitions.
# Use from tako.toml as runtime-local aliases, e.g.:
# runtime = "bun"
# preset = "tanstack-start"

[vite]
dev = ["vite", "dev"]

[vite.bun]
# Invoke Vite's script directly via `bun --bun` so the SSR module graph
# runs under Bun's ESM loader (needed for `bun:*` imports like `bun:sqlite`).
# `bunx --bun` / `bun x` go through a shim that drops fds > 2, breaking the
# fd-4 readiness handshake, so we target the resolved bin script instead.
dev = ["bun", "--bun", "./node_modules/.bin/vite", "dev"]

[tanstack-start]
main = "dist/server/tako-entry.mjs"
assets = ["dist/client"]
dev = ["vite", "dev"]

[tanstack-start.bun]
dev = ["bun", "--bun", "./node_modules/.bin/vite", "dev"]

[nextjs]
main = ".next/tako-entry.mjs"
dev = ["next", "dev"]
