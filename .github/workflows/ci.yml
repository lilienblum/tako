name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run workspace tests
        run: cargo test --workspace --locked --lib --bins

      - name: Run perf smoke tests
        run: cargo test -p tako-server --locked perf_smoke_

  bun:
    name: Bun
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run --filter 'tako.sh' typecheck

      - name: Test
        run: bun test --cwd sdk/js

      - name: SDK build
        run: bun run --filter 'tako.sh' build

  cli:
    name: CLI Tests
    needs: [build-x86_64-glibc]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download CLI binary
        uses: actions/download-artifact@v8
        with:
          name: bin-tako-linux-x86_64
          path: .e2e-bin

      - name: Make binary executable
        run: chmod +x .e2e-bin/tako

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run CLI tests
        env:
          TAKO_BIN: ${{ github.workspace }}/.e2e-bin/tako
        run: cd e2e/cli && bun test

  links:
    name: Links
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check website changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            website:
              - 'website/**'

      # Astro requires Node >= 22.12.0; runner default is too old
      - name: Setup Node
        if: steps.changes.outputs.website == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Setup Bun
        if: steps.changes.outputs.website == 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Install dependencies
        if: steps.changes.outputs.website == 'true'
        run: bun install --frozen-lockfile

      - name: Build website
        if: steps.changes.outputs.website == 'true'
        run: bun run --filter website build --silent

      - name: Check links
        if: steps.changes.outputs.website == 'true'
        uses: lycheeverse/lychee-action@v2
        with:
          args: "--root-dir website/dist --exclude 'dub\\.sh' website/dist/**/*.html"

  # x86_64 glibc — always run (PR + master), needed for E2E
  build-x86_64-glibc:
    name: Build x86_64 (glibc)
    runs-on: ubuntu-latest
    # Build inside Debian 11 container for glibc 2.31 compat (supports Debian 11+, Ubuntu 22.04+, RHEL 9+, Amazon Linux 2023)
    container: rust:1.89-bullseye
    defaults:
      run:
        shell: bash
    steps:
      - name: Install build deps
        run: apt-get update && apt-get install -y --no-install-recommends cmake pkg-config libssl-dev

      - name: Checkout
        uses: actions/checkout@v6

      - name: Build
        env:
          TAKO_CANARY_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          cargo build -p tako-server --release
          cargo build -p tako --bin tako --bin tako-dev-server --bin tako-loopback-proxy --release

      - name: Upload server binary
        uses: actions/upload-artifact@v7
        with:
          name: bin-tako-server-linux-x86_64-glibc
          path: target/release/tako-server
          if-no-files-found: error

      - name: Upload CLI binaries
        uses: actions/upload-artifact@v7
        with:
          name: bin-tako-linux-x86_64
          path: |
            target/release/tako
            target/release/tako-dev-server
            target/release/tako-loopback-proxy
          if-no-files-found: error

  # x86_64 musl — always run (PR + master), needed for E2E (Alpine)
  build-x86_64-musl:
    name: Build x86_64 (musl)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install musl toolchain
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends musl-tools

      - name: Build
        env:
          TAKO_CANARY_SHA: ${{ github.sha }}
        run: cargo build -p tako-server --release --target x86_64-unknown-linux-musl

      - name: Upload server binary
        uses: actions/upload-artifact@v7
        with:
          name: bin-tako-server-linux-x86_64-musl
          path: target/x86_64-unknown-linux-musl/release/tako-server
          if-no-files-found: error

  # aarch64 glibc — master only (for canary)
  build-aarch64-glibc:
    name: Build aarch64 (glibc)
    if: github.event_name == 'push'
    # 24.04-arm is the only GitHub-hosted ARM runner available
    runs-on: ubuntu-24.04-arm
    # Build inside Debian 11 container for glibc 2.31 compat (same as x86_64)
    container: rust:1.89-bullseye
    defaults:
      run:
        shell: bash
    steps:
      - name: Install build deps
        run: apt-get update && apt-get install -y --no-install-recommends cmake pkg-config libssl-dev

      - name: Checkout
        uses: actions/checkout@v6

      - name: Build
        env:
          TAKO_CANARY_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          cargo build -p tako-server --release
          cargo build -p tako --bin tako --bin tako-dev-server --bin tako-loopback-proxy --release

      - name: Upload server binary
        uses: actions/upload-artifact@v7
        with:
          name: bin-tako-server-linux-aarch64-glibc
          path: target/release/tako-server
          if-no-files-found: error

      - name: Upload CLI binaries
        uses: actions/upload-artifact@v7
        with:
          name: bin-tako-linux-aarch64
          path: |
            target/release/tako
            target/release/tako-dev-server
            target/release/tako-loopback-proxy
          if-no-files-found: error

  # aarch64 musl — master only (for canary)
  build-aarch64-musl:
    name: Build aarch64 (musl)
    if: github.event_name == 'push'
    # 24.04-arm is the only GitHub-hosted ARM runner available
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-musl

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install musl toolchain
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends musl-tools

      - name: Build
        env:
          TAKO_CANARY_SHA: ${{ github.sha }}
        run: cargo build -p tako-server --release --target aarch64-unknown-linux-musl

      - name: Upload server binary
        uses: actions/upload-artifact@v7
        with:
          name: bin-tako-server-linux-aarch64-musl
          path: target/aarch64-unknown-linux-musl/release/tako-server
          if-no-files-found: error

  # macOS builds — master only (for canary)
  build-darwin:
    name: Build macOS CLI
    if: github.event_name == 'push'
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build
        env:
          TAKO_CANARY_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          cargo build -p tako --bin tako --bin tako-dev-server --bin tako-loopback-proxy --release --target aarch64-apple-darwin
          cargo build -p tako --bin tako --bin tako-dev-server --bin tako-loopback-proxy --release --target x86_64-apple-darwin

      - name: Upload aarch64
        uses: actions/upload-artifact@v7
        with:
          name: bin-tako-darwin-aarch64
          path: |
            target/aarch64-apple-darwin/release/tako
            target/aarch64-apple-darwin/release/tako-dev-server
            target/aarch64-apple-darwin/release/tako-loopback-proxy
          if-no-files-found: error

      - name: Upload x86_64
        uses: actions/upload-artifact@v7
        with:
          name: bin-tako-darwin-x86_64
          path: |
            target/x86_64-apple-darwin/release/tako
            target/x86_64-apple-darwin/release/tako-dev-server
            target/x86_64-apple-darwin/release/tako-loopback-proxy
          if-no-files-found: error

  e2e:
    name: E2E
    needs: [build-x86_64-glibc, build-x86_64-musl]
    runs-on: ubuntu-latest
    env:
      DOCKER_BUILDKIT: "1"
      COMPOSE_DOCKER_CLI_BUILD: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download CLI + server (glibc)
        uses: actions/download-artifact@v8
        with:
          name: bin-tako-linux-x86_64
          path: .e2e-bin/glibc

      - name: Download server (glibc)
        uses: actions/download-artifact@v8
        with:
          name: bin-tako-server-linux-x86_64-glibc
          path: .e2e-bin/glibc

      - name: Download server (musl)
        uses: actions/download-artifact@v8
        with:
          name: bin-tako-server-linux-x86_64-musl
          path: .e2e-bin/musl

      - name: Make binaries executable
        run: chmod +x .e2e-bin/glibc/* .e2e-bin/musl/*

      - name: Run E2E suites
        env:
          E2E_BIN_DIR: ${{ github.workspace }}/.e2e-bin
        run: |
          set -euo pipefail
          for fixture in $(find e2e/fixtures/js -mindepth 1 -maxdepth 1 -type d | sort); do
            ./e2e/run.sh "$fixture"
          done
