name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run workspace tests
        run: cargo test --workspace --locked --lib --bins

      - name: Run perf smoke tests
        run: cargo test -p tako-server --locked perf_smoke_

  bun:
    name: Bun
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run --filter '*' typecheck

      - name: Test
        run: bun test

      - name: SDK build
        run: bun run --cwd sdk/js build

  # x86_64 builds — always run (PR + master), needed for E2E
  build-x86_64:
    name: Build x86_64 (${{ matrix.libc }})
    # Pinned to 22.04 for glibc 2.35 compat (supports Debian 12+, Ubuntu 22.04+, RHEL 9+)
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        include:
          - libc: glibc
            target: x86_64-unknown-linux-gnu
            cli: true
          - libc: musl
            target: x86_64-unknown-linux-musl
            cli: false
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install musl toolchain
        if: matrix.libc == 'musl'
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends musl-tools

      - name: Build
        env:
          TAKO_CANARY_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          cargo build -p tako-server --release --target ${{ matrix.target }}
          if [ "${{ matrix.cli }}" = "true" ]; then
            cargo build -p tako --bin tako --bin tako-dev-server --bin tako-loopback-proxy --release --target ${{ matrix.target }}
          fi

      - name: Upload server binary
        uses: actions/upload-artifact@v7
        with:
          name: bin-tako-server-linux-x86_64-${{ matrix.libc }}
          path: target/${{ matrix.target }}/release/tako-server
          if-no-files-found: error

      - name: Upload CLI binaries
        if: matrix.cli
        uses: actions/upload-artifact@v7
        with:
          name: bin-tako-linux-x86_64
          path: |
            target/${{ matrix.target }}/release/tako
            target/${{ matrix.target }}/release/tako-dev-server
            target/${{ matrix.target }}/release/tako-loopback-proxy
          if-no-files-found: error

  # aarch64 builds — master only (for canary)
  build-aarch64:
    name: Build aarch64 (${{ matrix.libc }})
    if: github.event_name == 'push'
    # 24.04-arm is the only GitHub-hosted ARM runner available
    runs-on: ubuntu-24.04-arm
    # Build inside 22.04 container for glibc 2.35 compat (same as x86_64)
    container:
      image: ubuntu:22.04
      env:
        HOME: /root
    strategy:
      matrix:
        include:
          - libc: glibc
            target: aarch64-unknown-linux-gnu
            cli: true
          - libc: musl
            target: aarch64-unknown-linux-musl
            cli: false
    steps:
      - name: Install build deps
        run: |
          apt-get update
          apt-get install -y --no-install-recommends curl gcc pkg-config libssl-dev ca-certificates git

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install musl toolchain
        if: matrix.libc == 'musl'
        run: apt-get install -y --no-install-recommends musl-tools

      - name: Build
        env:
          TAKO_CANARY_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          cargo build -p tako-server --release --target ${{ matrix.target }}
          if [ "${{ matrix.cli }}" = "true" ]; then
            cargo build -p tako --bin tako --bin tako-dev-server --bin tako-loopback-proxy --release --target ${{ matrix.target }}
          fi

      - name: Upload server binary
        uses: actions/upload-artifact@v7
        with:
          name: bin-tako-server-linux-aarch64-${{ matrix.libc }}
          path: target/${{ matrix.target }}/release/tako-server
          if-no-files-found: error

      - name: Upload CLI binaries
        if: matrix.cli
        uses: actions/upload-artifact@v7
        with:
          name: bin-tako-linux-aarch64
          path: |
            target/${{ matrix.target }}/release/tako
            target/${{ matrix.target }}/release/tako-dev-server
            target/${{ matrix.target }}/release/tako-loopback-proxy
          if-no-files-found: error

  # macOS builds — master only (for canary)
  build-darwin:
    name: Build macOS CLI
    if: github.event_name == 'push'
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build
        env:
          TAKO_CANARY_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          cargo build -p tako --bin tako --bin tako-dev-server --bin tako-loopback-proxy --release --target aarch64-apple-darwin
          cargo build -p tako --bin tako --bin tako-dev-server --bin tako-loopback-proxy --release --target x86_64-apple-darwin

      - name: Upload aarch64
        uses: actions/upload-artifact@v7
        with:
          name: bin-tako-darwin-aarch64
          path: |
            target/aarch64-apple-darwin/release/tako
            target/aarch64-apple-darwin/release/tako-dev-server
            target/aarch64-apple-darwin/release/tako-loopback-proxy
          if-no-files-found: error

      - name: Upload x86_64
        uses: actions/upload-artifact@v7
        with:
          name: bin-tako-darwin-x86_64
          path: |
            target/x86_64-apple-darwin/release/tako
            target/x86_64-apple-darwin/release/tako-dev-server
            target/x86_64-apple-darwin/release/tako-loopback-proxy
          if-no-files-found: error

  e2e:
    name: E2E
    needs: [build-x86_64]
    runs-on: ubuntu-latest
    env:
      DOCKER_BUILDKIT: "1"
      COMPOSE_DOCKER_CLI_BUILD: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download CLI + server (glibc)
        uses: actions/download-artifact@v8
        with:
          name: bin-tako-linux-x86_64
          path: .e2e-bin/glibc

      - name: Download server (glibc)
        uses: actions/download-artifact@v8
        with:
          name: bin-tako-server-linux-x86_64-glibc
          path: .e2e-bin/glibc

      - name: Download server (musl)
        uses: actions/download-artifact@v8
        with:
          name: bin-tako-server-linux-x86_64-musl
          path: .e2e-bin/musl

      - name: Make binaries executable
        run: chmod +x .e2e-bin/glibc/* .e2e-bin/musl/*

      - name: Run E2E suites
        env:
          E2E_BIN_DIR: ${{ github.workspace }}/.e2e-bin
        run: |
          set -euo pipefail
          for fixture in $(find e2e/fixtures/js -mindepth 1 -maxdepth 1 -type d | sort); do
            ./e2e/run.sh "$fixture"
          done
