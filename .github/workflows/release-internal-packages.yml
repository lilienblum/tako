name: Release internal packages (cargo)

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [master]

jobs:
  publish:
    name: Publish internal crates
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: master
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Publish tako-core
        run: |
          set -euo pipefail
          crate="tako-core"

          current=$(grep '^version = ' "${crate}/Cargo.toml" | head -1 | sed 's/version = "\(.*\)"/\1/')
          tag=$(git tag --list "${crate}-v*" --sort=-v:refname | head -1)

          if [ -n "$tag" ]; then
            changes=$(git rev-list "${tag}..HEAD" -- "${crate}/")
            if [ -z "$changes" ]; then
              echo "${crate}: no changes since ${tag}, skipping"
              exit 0
            fi
            new_version=$(echo "$current" | awk -F. '{$NF=$NF+1; print $1"."$2"."$NF}')
          else
            new_version="$current"
          fi

          echo "${crate}: publishing v${new_version}"

          if [ "$current" != "$new_version" ]; then
            sed -i 's/^version = "'"$current"'"/version = "'"$new_version"'"/' "${crate}/Cargo.toml"
            sed -i '/^name = "'"$crate"'"$/{n;s/^version = ".*"/version = "'"$new_version"'"/;}' Cargo.lock
            for toml in tako/Cargo.toml tako-server/Cargo.toml; do
              if grep -q "^${crate} = " "$toml" 2>/dev/null; then
                sed -i 's/^\('"$crate"' = {.*version = "\)[^"]*/\1'"$new_version"'/' "$toml"
              fi
            done
            git add -A
            git commit -m "chore(${crate}): release v${new_version} [skip ci]"
            git push origin master
          fi

          cargo publish -p "$crate"

          new_tag="${crate}-v${new_version}"
          if ! git rev-parse "refs/tags/$new_tag" >/dev/null 2>&1; then
            git tag "$new_tag"
            git push origin "$new_tag"
          fi
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish tako-socket
        run: |
          set -euo pipefail
          crate="tako-socket"

          current=$(grep '^version = ' "${crate}/Cargo.toml" | head -1 | sed 's/version = "\(.*\)"/\1/')
          tag=$(git tag --list "${crate}-v*" --sort=-v:refname | head -1)

          if [ -n "$tag" ]; then
            changes=$(git rev-list "${tag}..HEAD" -- "${crate}/")
            if [ -z "$changes" ]; then
              echo "${crate}: no changes since ${tag}, skipping"
              exit 0
            fi
            new_version=$(echo "$current" | awk -F. '{$NF=$NF+1; print $1"."$2"."$NF}')
          else
            new_version="$current"
          fi

          echo "${crate}: publishing v${new_version}"

          if [ "$current" != "$new_version" ]; then
            sed -i 's/^version = "'"$current"'"/version = "'"$new_version"'"/' "${crate}/Cargo.toml"
            sed -i '/^name = "'"$crate"'"$/{n;s/^version = ".*"/version = "'"$new_version"'"/;}' Cargo.lock
            for toml in tako/Cargo.toml tako-server/Cargo.toml; do
              if grep -q "^${crate} = " "$toml" 2>/dev/null; then
                sed -i 's/^\('"$crate"' = {.*version = "\)[^"]*/\1'"$new_version"'/' "$toml"
              fi
            done
            git add -A
            git commit -m "chore(${crate}): release v${new_version} [skip ci]"
            git push origin master
          fi

          cargo publish -p "$crate"

          new_tag="${crate}-v${new_version}"
          if ! git rev-parse "refs/tags/$new_tag" >/dev/null 2>&1; then
            git tag "$new_tag"
            git push origin "$new_tag"
          fi
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish tako-runtime
        run: |
          set -euo pipefail
          crate="tako-runtime"

          current=$(grep '^version = ' "${crate}/Cargo.toml" | head -1 | sed 's/version = "\(.*\)"/\1/')
          tag=$(git tag --list "${crate}-v*" --sort=-v:refname | head -1)

          if [ -n "$tag" ]; then
            changes=$(git rev-list "${tag}..HEAD" -- "${crate}/" "registry/")
            if [ -z "$changes" ]; then
              echo "${crate}: no changes since ${tag}, skipping"
              exit 0
            fi
            new_version=$(echo "$current" | awk -F. '{$NF=$NF+1; print $1"."$2"."$NF}')
          else
            new_version="$current"
          fi

          echo "${crate}: publishing v${new_version}"

          if [ "$current" != "$new_version" ]; then
            sed -i 's/^version = "'"$current"'"/version = "'"$new_version"'"/' "${crate}/Cargo.toml"
            sed -i '/^name = "'"$crate"'"$/{n;s/^version = ".*"/version = "'"$new_version"'"/;}' Cargo.lock
            for toml in tako/Cargo.toml tako-server/Cargo.toml; do
              if grep -q "^${crate} = " "$toml" 2>/dev/null; then
                sed -i 's/^\('"$crate"' = {.*version = "\)[^"]*/\1'"$new_version"'/' "$toml"
              fi
            done
            git add -A
            git commit -m "chore(${crate}): release v${new_version} [skip ci]"
            git push origin master
          fi

          cargo publish -p "$crate"

          new_tag="${crate}-v${new_version}"
          if ! git rev-parse "refs/tags/$new_tag" >/dev/null 2>&1; then
            git tag "$new_tag"
            git push origin "$new_tag"
          fi
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
