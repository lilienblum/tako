name: Release tako-server

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions: {}

jobs:
  release:
    uses: ./.github/workflows/release-cargo.yml
    with:
      crate: tako-server
      directory: tako-server
      bump: ${{ inputs.bump }}
      title: Tako Server
    secrets:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
