name: Canary Release

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: canary-release
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-linux-target:
    name: Build Linux (${{ matrix.outarch }}-${{ matrix.libc }})
    if: github.ref == 'refs/heads/master'
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - outarch: x86_64
            target: x86_64-unknown-linux-gnu
            libc: glibc
            runs_on: ubuntu-latest
          - outarch: aarch64
            target: aarch64-unknown-linux-gnu
            libc: glibc
            runs_on: ubuntu-24.04-arm
          - outarch: x86_64
            target: x86_64-unknown-linux-musl
            libc: musl
            runs_on: ubuntu-latest
          - outarch: aarch64
            target: aarch64-unknown-linux-musl
            libc: musl
            runs_on: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install musl toolchain
        if: matrix.libc == 'musl'
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends musl-tools

      - name: Build artifacts
        env:
          TAKO_CANARY_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          mkdir -p dist

          if [ "${{ matrix.libc }}" = "musl" ]; then
            cargo build -p tako-server --release --target ${{ matrix.target }}
          else
            cargo build -p tako --bin tako --bin tako-dev-server --release
            cargo build -p tako-server --release
          fi

      - name: Package server artifact
        run: |
          set -euo pipefail
          if [ "${{ matrix.libc }}" = "musl" ]; then
            server_bin="target/${{ matrix.target }}/release/tako-server"
          else
            server_bin="target/release/tako-server"
          fi

          tmpdir="$(mktemp -d)"
          cp "$server_bin" "$tmpdir/tako-server"
          tar -cf - -C "$tmpdir" tako-server | zstd -19 -o "dist/tako-server-linux-${{ matrix.outarch }}-${{ matrix.libc }}.tar.zst"
          sha256sum "dist/tako-server-linux-${{ matrix.outarch }}-${{ matrix.libc }}.tar.zst" > "dist/tako-server-linux-${{ matrix.outarch }}-${{ matrix.libc }}.tar.zst.sha256"
          rm -rf "$tmpdir"

      - name: Package CLI artifact
        if: matrix.libc == 'glibc'
        run: |
          set -euo pipefail
          tmpdir="$(mktemp -d)"
          cp target/release/tako "$tmpdir/tako"
          cp target/release/tako-dev-server "$tmpdir/tako-dev-server"
          tar -czf "dist/tako-linux-${{ matrix.outarch }}.tar.gz" -C "$tmpdir" tako tako-dev-server
          sha256sum "dist/tako-linux-${{ matrix.outarch }}.tar.gz" > "dist/tako-linux-${{ matrix.outarch }}.tar.gz.sha256"
          rm -rf "$tmpdir"

      - name: Upload Linux server artifact
        uses: actions/upload-artifact@v4
        with:
          name: canary-linux-${{ matrix.outarch }}-${{ matrix.libc }}
          path: |
            dist/tako-server-linux-${{ matrix.outarch }}-${{ matrix.libc }}.tar.zst
            dist/tako-server-linux-${{ matrix.outarch }}-${{ matrix.libc }}.tar.zst.sha256
          if-no-files-found: error

      - name: Upload Linux CLI artifact
        if: matrix.libc == 'glibc'
        uses: actions/upload-artifact@v4
        with:
          name: canary-linux-cli-${{ matrix.outarch }}
          path: |
            dist/tako-linux-${{ matrix.outarch }}.tar.gz
            dist/tako-linux-${{ matrix.outarch }}.tar.gz.sha256
          if-no-files-found: error

  build-darwin-cli:
    name: Build macOS CLI Artifacts
    if: github.ref == 'refs/heads/master'
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build and package macOS CLI artifacts
        run: |
          set -euo pipefail
          mkdir -p dist
          export TAKO_CANARY_SHA="$GITHUB_SHA"

          cargo build -p tako --bin tako --bin tako-dev-server --release --target aarch64-apple-darwin
          cargo build -p tako --bin tako --bin tako-dev-server --release --target x86_64-apple-darwin

          tmpdir="$(mktemp -d)"
          cp target/aarch64-apple-darwin/release/tako "$tmpdir/tako"
          cp target/aarch64-apple-darwin/release/tako-dev-server "$tmpdir/tako-dev-server"
          tar -czf dist/tako-darwin-aarch64.tar.gz -C "$tmpdir" tako tako-dev-server
          rm -rf "$tmpdir"

          tmpdir="$(mktemp -d)"
          cp target/x86_64-apple-darwin/release/tako "$tmpdir/tako"
          cp target/x86_64-apple-darwin/release/tako-dev-server "$tmpdir/tako-dev-server"
          tar -czf dist/tako-darwin-x86_64.tar.gz -C "$tmpdir" tako tako-dev-server
          rm -rf "$tmpdir"

          shasum -a 256 dist/tako-darwin-aarch64.tar.gz > dist/tako-darwin-aarch64.tar.gz.sha256
          shasum -a 256 dist/tako-darwin-x86_64.tar.gz > dist/tako-darwin-x86_64.tar.gz.sha256

          ls -1 dist/tako-darwin-*.tar.gz dist/tako-darwin-*.tar.gz.sha256

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: canary-darwin
          path: |
            dist/tako-darwin-*.tar.gz
            dist/tako-darwin-*.tar.gz.sha256
          if-no-files-found: error

  publish:
    name: Publish Canary Prerelease
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    needs:
      - build-linux-target
      - build-darwin-cli
    environment: release-canary
    permissions:
      contents: write
    steps:
      - name: Checkout (for tag update)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GH_PAT }}

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: canary-linux-*
          merge-multiple: true
          path: dist

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: canary-darwin
          path: dist

      - name: Move canary-latest tag to current commit
        run: |
          git tag -f canary-latest "$GITHUB_SHA"
          git push -f origin canary-latest

      - name: Publish canary prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          assets=(
            dist/tako-darwin-aarch64.tar.gz
            dist/tako-darwin-aarch64.tar.gz.sha256
            dist/tako-darwin-x86_64.tar.gz
            dist/tako-darwin-x86_64.tar.gz.sha256
            dist/tako-linux-x86_64.tar.gz
            dist/tako-linux-x86_64.tar.gz.sha256
            dist/tako-linux-aarch64.tar.gz
            dist/tako-linux-aarch64.tar.gz.sha256
            dist/tako-server-linux-x86_64-glibc.tar.zst
            dist/tako-server-linux-x86_64-glibc.tar.zst.sha256
            dist/tako-server-linux-aarch64-glibc.tar.zst
            dist/tako-server-linux-aarch64-glibc.tar.zst.sha256
            dist/tako-server-linux-x86_64-musl.tar.zst
            dist/tako-server-linux-x86_64-musl.tar.zst.sha256
            dist/tako-server-linux-aarch64-musl.tar.zst
            dist/tako-server-linux-aarch64-musl.tar.zst.sha256
          )

          for f in "${assets[@]}"; do test -f "$f"; done

          timestamp="$(date -u +'%Y-%m-%d %H:%M UTC')"
          short_sha="$(printf '%s' "$GITHUB_SHA" | cut -c1-7)"
          title="Canary"
          notes="Latest canary build from master (${short_sha}) on ${timestamp}."

          if ! gh release view canary-latest >/dev/null 2>&1; then
            gh release create canary-latest \
              --prerelease \
              --target master \
              --title "$title" \
              --notes "$notes"
          fi

          gh release edit canary-latest --title "$title" --notes "$notes"
          gh release upload canary-latest --clobber "${assets[@]}"
