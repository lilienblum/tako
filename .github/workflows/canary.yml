name: Canary Release

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: canary-release
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-linux-cli:
    name: Build Linux CLI (${{ matrix.arch }})
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            outarch: x86_64
          - arch: arm64
            outarch: aarch64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and package Linux CLI artifact
        run: |
          set -euo pipefail
          mkdir -p dist

          docker buildx build -f docker/build.Dockerfile \
            --platform "linux/${{ matrix.arch }}" \
            --target tako-artifact-glibc \
            --build-arg TAKO_CANARY_SHA="$GITHUB_SHA" \
            --build-arg BUILD_TAKO=1 \
            --build-arg BUILD_TAKO_SERVER=0 \
            --cache-from "type=gha,scope=canary-linux-cli-${{ matrix.arch }}" \
            --cache-to "type=gha,scope=canary-linux-cli-${{ matrix.arch }},mode=max" \
            --output "type=local,dest=dist/linux-${{ matrix.arch }}-glibc" \
            .

          tmpdir="$(mktemp -d)"
          cp "dist/linux-${{ matrix.arch }}-glibc/tako" "$tmpdir/tako"
          tar -czf "dist/tako-linux-${{ matrix.outarch }}.tar.gz" -C "$tmpdir" tako
          sha256sum "dist/tako-linux-${{ matrix.outarch }}.tar.gz" > "dist/tako-linux-${{ matrix.outarch }}.tar.gz.sha256"
          rm -rf "$tmpdir" "dist/linux-${{ matrix.arch }}-glibc"

      - name: Upload Linux CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: canary-linux-cli-${{ matrix.arch }}
          path: |
            dist/tako-linux-${{ matrix.outarch }}.tar.gz
            dist/tako-linux-${{ matrix.outarch }}.tar.gz.sha256
          if-no-files-found: error

  build-linux-server:
    name: Build Linux Server (${{ matrix.arch }}-${{ matrix.libc }})
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            outarch: x86_64
            libc: glibc
          - arch: arm64
            outarch: aarch64
            libc: glibc
          - arch: amd64
            outarch: x86_64
            libc: musl
          - arch: arm64
            outarch: aarch64
            libc: musl
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and package Linux server artifact
        run: |
          set -euo pipefail
          mkdir -p dist

          docker buildx build -f docker/build.Dockerfile \
            --platform "linux/${{ matrix.arch }}" \
            --target "tako-server-artifact-${{ matrix.libc }}" \
            --build-arg TAKO_CANARY_SHA="$GITHUB_SHA" \
            --build-arg BUILD_TAKO=0 \
            --build-arg BUILD_TAKO_SERVER=1 \
            --cache-from "type=gha,scope=canary-linux-server-${{ matrix.arch }}-${{ matrix.libc }}" \
            --cache-to "type=gha,scope=canary-linux-server-${{ matrix.arch }}-${{ matrix.libc }},mode=max" \
            --output "type=local,dest=dist/linux-${{ matrix.arch }}-${{ matrix.libc }}" \
            .

          tmpdir="$(mktemp -d)"
          cp "dist/linux-${{ matrix.arch }}-${{ matrix.libc }}/tako-server" "$tmpdir/tako-server"
          tar -czf "dist/tako-server-linux-${{ matrix.outarch }}-${{ matrix.libc }}.tar.gz" -C "$tmpdir" tako-server
          sha256sum "dist/tako-server-linux-${{ matrix.outarch }}-${{ matrix.libc }}.tar.gz" > "dist/tako-server-linux-${{ matrix.outarch }}-${{ matrix.libc }}.tar.gz.sha256"
          rm -rf "$tmpdir" "dist/linux-${{ matrix.arch }}-${{ matrix.libc }}"

      - name: Upload Linux server artifact
        uses: actions/upload-artifact@v4
        with:
          name: canary-linux-server-${{ matrix.arch }}-${{ matrix.libc }}
          path: |
            dist/tako-server-linux-${{ matrix.outarch }}-${{ matrix.libc }}.tar.gz
            dist/tako-server-linux-${{ matrix.outarch }}-${{ matrix.libc }}.tar.gz.sha256
          if-no-files-found: error

  build-darwin-cli:
    name: Build macOS CLI Artifacts
    if: github.ref == 'refs/heads/master'
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build and package macOS CLI artifacts
        run: |
          set -euo pipefail
          mkdir -p dist
          export TAKO_CANARY_SHA="$GITHUB_SHA"

          cargo build -p tako --bin tako --release --target aarch64-apple-darwin
          cargo build -p tako --bin tako --release --target x86_64-apple-darwin

          tmpdir="$(mktemp -d)"
          cp target/aarch64-apple-darwin/release/tako "$tmpdir/tako"
          tar -czf dist/tako-darwin-aarch64.tar.gz -C "$tmpdir" tako
          rm -rf "$tmpdir"

          tmpdir="$(mktemp -d)"
          cp target/x86_64-apple-darwin/release/tako "$tmpdir/tako"
          tar -czf dist/tako-darwin-x86_64.tar.gz -C "$tmpdir" tako
          rm -rf "$tmpdir"

          shasum -a 256 dist/tako-darwin-aarch64.tar.gz > dist/tako-darwin-aarch64.tar.gz.sha256
          shasum -a 256 dist/tako-darwin-x86_64.tar.gz > dist/tako-darwin-x86_64.tar.gz.sha256

          ls -1 dist/tako-darwin-*.tar.gz dist/tako-darwin-*.tar.gz.sha256

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: canary-darwin
          path: |
            dist/tako-darwin-*.tar.gz
            dist/tako-darwin-*.tar.gz.sha256
          if-no-files-found: error

  publish:
    name: Publish Canary Prerelease
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    needs:
      - build-linux-cli
      - build-linux-server
      - build-darwin-cli
    permissions:
      contents: write
    steps:
      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: canary-linux-*
          merge-multiple: true
          path: dist

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: canary-darwin
          path: dist

      - name: Publish moving canary prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          for required in \
            dist/tako-darwin-aarch64.tar.gz \
            dist/tako-darwin-aarch64.tar.gz.sha256 \
            dist/tako-darwin-x86_64.tar.gz \
            dist/tako-darwin-x86_64.tar.gz.sha256 \
            dist/tako-linux-x86_64.tar.gz \
            dist/tako-linux-x86_64.tar.gz.sha256 \
            dist/tako-linux-aarch64.tar.gz \
            dist/tako-linux-aarch64.tar.gz.sha256 \
            dist/tako-server-linux-x86_64-glibc.tar.gz \
            dist/tako-server-linux-x86_64-glibc.tar.gz.sha256 \
            dist/tako-server-linux-aarch64-glibc.tar.gz \
            dist/tako-server-linux-aarch64-glibc.tar.gz.sha256 \
            dist/tako-server-linux-x86_64-musl.tar.gz \
            dist/tako-server-linux-x86_64-musl.tar.gz.sha256 \
            dist/tako-server-linux-aarch64-musl.tar.gz \
            dist/tako-server-linux-aarch64-musl.tar.gz.sha256; do
            test -f "$required"
          done

          if gh release view canary >/dev/null 2>&1; then
            gh release delete canary --yes --cleanup-tag
          fi

          timestamp="$(date -u +'%Y-%m-%d %H:%M UTC')"
          short_sha="$(printf '%s' "$GITHUB_SHA" | cut -c1-7)"
          notes="Latest canary build from master (${short_sha}) on ${timestamp}."

          gh release create canary \
            --prerelease \
            --target "$GITHUB_SHA" \
            --title "canary" \
            --notes "$notes" \
            dist/tako-darwin-aarch64.tar.gz \
            dist/tako-darwin-aarch64.tar.gz.sha256 \
            dist/tako-darwin-x86_64.tar.gz \
            dist/tako-darwin-x86_64.tar.gz.sha256 \
            dist/tako-linux-x86_64.tar.gz \
            dist/tako-linux-x86_64.tar.gz.sha256 \
            dist/tako-linux-aarch64.tar.gz \
            dist/tako-linux-aarch64.tar.gz.sha256 \
            dist/tako-server-linux-x86_64-glibc.tar.gz \
            dist/tako-server-linux-x86_64-glibc.tar.gz.sha256 \
            dist/tako-server-linux-aarch64-glibc.tar.gz \
            dist/tako-server-linux-aarch64-glibc.tar.gz.sha256 \
            dist/tako-server-linux-x86_64-musl.tar.gz \
            dist/tako-server-linux-x86_64-musl.tar.gz.sha256 \
            dist/tako-server-linux-aarch64-musl.tar.gz \
            dist/tako-server-linux-aarch64-musl.tar.gz.sha256
