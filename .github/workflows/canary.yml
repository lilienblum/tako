name: Canary Release

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: canary-release
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-linux-target:
    name: Build Linux (${{ matrix.outarch }}-${{ matrix.libc }})
    if: github.ref == 'refs/heads/master'
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - outarch: x86_64
            libc: glibc
            runs_on: ubuntu-latest
          - outarch: aarch64
            libc: glibc
            runs_on: ubuntu-24.04-arm
          - arch: amd64
            outarch: x86_64
            libc: musl
            runs_on: ubuntu-latest
          - arch: arm64
            outarch: aarch64
            libc: musl
            runs_on: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # --- glibc: native cargo build ---
      - name: Setup Rust
        if: matrix.libc == 'glibc'
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        if: matrix.libc == 'glibc'
        uses: Swatinem/rust-cache@v2

      - name: Install glibc build dependencies
        if: matrix.libc == 'glibc'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends pkg-config libssl-dev libsqlite3-dev

      - name: Build and package glibc artifacts
        if: matrix.libc == 'glibc'
        env:
          TAKO_CANARY_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          mkdir -p dist

          cargo build -p tako --bin tako --bin tako-dev-server --release
          cargo build -p tako-server --release

          tmpdir="$(mktemp -d)"
          cp target/release/tako "$tmpdir/tako"
          cp target/release/tako-dev-server "$tmpdir/tako-dev-server"
          tar -czf "dist/tako-linux-${{ matrix.outarch }}.tar.gz" -C "$tmpdir" tako tako-dev-server
          sha256sum "dist/tako-linux-${{ matrix.outarch }}.tar.gz" > "dist/tako-linux-${{ matrix.outarch }}.tar.gz.sha256"
          rm -rf "$tmpdir"

          tmpdir="$(mktemp -d)"
          cp target/release/tako-server "$tmpdir/tako-server"
          tar -czf "dist/tako-server-linux-${{ matrix.outarch }}-glibc.tar.gz" -C "$tmpdir" tako-server
          sha256sum "dist/tako-server-linux-${{ matrix.outarch }}-glibc.tar.gz" > "dist/tako-server-linux-${{ matrix.outarch }}-glibc.tar.gz.sha256"
          rm -rf "$tmpdir"

      # --- musl: Docker build on native runner (no QEMU) ---
      - name: Setup Docker Buildx
        if: matrix.libc == 'musl'
        uses: docker/setup-buildx-action@v3

      - name: Build and package musl artifacts
        if: matrix.libc == 'musl'
        run: |
          set -euo pipefail
          mkdir -p dist

          docker buildx build -f docker/build.Dockerfile \
            --target "tako-server-artifact-musl" \
            --build-arg TAKO_CANARY_SHA="$GITHUB_SHA" \
            --build-arg BUILD_TAKO=0 \
            --build-arg BUILD_TAKO_SERVER=1 \
            --cache-from "type=gha,scope=canary-linux-${{ matrix.arch }}-musl" \
            --cache-to "type=gha,scope=canary-linux-${{ matrix.arch }}-musl,mode=max" \
            --output "type=local,dest=dist/tako-server-build" \
            .

          tmpdir="$(mktemp -d)"
          cp "dist/tako-server-build/tako-server" "$tmpdir/tako-server"
          tar -czf "dist/tako-server-linux-${{ matrix.outarch }}-musl.tar.gz" -C "$tmpdir" tako-server
          sha256sum "dist/tako-server-linux-${{ matrix.outarch }}-musl.tar.gz" > "dist/tako-server-linux-${{ matrix.outarch }}-musl.tar.gz.sha256"
          rm -rf "$tmpdir" "dist/tako-server-build"

      - name: Upload Linux server artifact
        uses: actions/upload-artifact@v4
        with:
          name: canary-linux-${{ matrix.outarch }}-${{ matrix.libc }}
          path: |
            dist/tako-server-linux-${{ matrix.outarch }}-${{ matrix.libc }}.tar.gz
            dist/tako-server-linux-${{ matrix.outarch }}-${{ matrix.libc }}.tar.gz.sha256
          if-no-files-found: error

      - name: Upload Linux CLI artifact
        if: matrix.libc == 'glibc'
        uses: actions/upload-artifact@v4
        with:
          name: canary-linux-cli-${{ matrix.outarch }}
          path: |
            dist/tako-linux-${{ matrix.outarch }}.tar.gz
            dist/tako-linux-${{ matrix.outarch }}.tar.gz.sha256
          if-no-files-found: error

  build-darwin-cli:
    name: Build macOS CLI Artifacts
    if: github.ref == 'refs/heads/master'
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build and package macOS CLI artifacts
        run: |
          set -euo pipefail
          mkdir -p dist
          export TAKO_CANARY_SHA="$GITHUB_SHA"

          cargo build -p tako --bin tako --bin tako-dev-server --release --target aarch64-apple-darwin
          cargo build -p tako --bin tako --bin tako-dev-server --release --target x86_64-apple-darwin

          tmpdir="$(mktemp -d)"
          cp target/aarch64-apple-darwin/release/tako "$tmpdir/tako"
          cp target/aarch64-apple-darwin/release/tako-dev-server "$tmpdir/tako-dev-server"
          tar -czf dist/tako-darwin-aarch64.tar.gz -C "$tmpdir" tako tako-dev-server
          rm -rf "$tmpdir"

          tmpdir="$(mktemp -d)"
          cp target/x86_64-apple-darwin/release/tako "$tmpdir/tako"
          cp target/x86_64-apple-darwin/release/tako-dev-server "$tmpdir/tako-dev-server"
          tar -czf dist/tako-darwin-x86_64.tar.gz -C "$tmpdir" tako tako-dev-server
          rm -rf "$tmpdir"

          shasum -a 256 dist/tako-darwin-aarch64.tar.gz > dist/tako-darwin-aarch64.tar.gz.sha256
          shasum -a 256 dist/tako-darwin-x86_64.tar.gz > dist/tako-darwin-x86_64.tar.gz.sha256

          ls -1 dist/tako-darwin-*.tar.gz dist/tako-darwin-*.tar.gz.sha256

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: canary-darwin
          path: |
            dist/tako-darwin-*.tar.gz
            dist/tako-darwin-*.tar.gz.sha256
          if-no-files-found: error

  publish:
    name: Publish Canary Prerelease
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    needs:
      - build-linux-target
      - build-darwin-cli
    permissions:
      contents: write
    steps:
      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: canary-linux-*
          merge-multiple: true
          path: dist

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: canary-darwin
          path: dist

      - name: Publish canary prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          assets=(
            dist/tako-darwin-aarch64.tar.gz
            dist/tako-darwin-aarch64.tar.gz.sha256
            dist/tako-darwin-x86_64.tar.gz
            dist/tako-darwin-x86_64.tar.gz.sha256
            dist/tako-linux-x86_64.tar.gz
            dist/tako-linux-x86_64.tar.gz.sha256
            dist/tako-linux-aarch64.tar.gz
            dist/tako-linux-aarch64.tar.gz.sha256
            dist/tako-server-linux-x86_64-glibc.tar.gz
            dist/tako-server-linux-x86_64-glibc.tar.gz.sha256
            dist/tako-server-linux-aarch64-glibc.tar.gz
            dist/tako-server-linux-aarch64-glibc.tar.gz.sha256
            dist/tako-server-linux-x86_64-musl.tar.gz
            dist/tako-server-linux-x86_64-musl.tar.gz.sha256
            dist/tako-server-linux-aarch64-musl.tar.gz
            dist/tako-server-linux-aarch64-musl.tar.gz.sha256
          )

          for f in "${assets[@]}"; do test -f "$f"; done

          timestamp="$(date -u +'%Y-%m-%d %H:%M UTC')"
          short_sha="$(printf '%s' "$GITHUB_SHA" | cut -c1-7)"
          title="Canary (${GITHUB_SHA})"
          notes="Latest canary build from master (${short_sha}) on ${timestamp}."

          if ! gh release view canary-latest >/dev/null 2>&1; then
            gh release create canary-latest \
              --prerelease \
              --target master \
              --title "$title" \
              --notes "$notes"
          fi

          gh release edit canary-latest --title "$title" --notes "$notes"
          gh release upload canary-latest --clobber "${assets[@]}"
