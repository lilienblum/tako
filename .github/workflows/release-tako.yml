name: Release tako

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  actions: read

jobs:
  release:
    uses: ./.github/workflows/release-cargo.yml
    with:
      crate: tako
      directory: tako
      bump: ${{ inputs.bump }}
      title: Tako CLI
    secrets:
      GH_PAT: ${{ secrets.GH_PAT }}
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
