name: Publish SDK canary

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [master]

permissions:
  contents: read

jobs:
  canary:
    name: Publish canary
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment: release
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 2

      - name: Check for SDK changes
        id: changes
        run: |
          if ! git diff --name-only HEAD~1 -- sdk/javascript/ | grep -q .; then
            echo "No SDK changes, skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        if: steps.changes.outputs.skip != 'true'
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Setup Bun
        if: steps.changes.outputs.skip != 'true'
        uses: oven-sh/setup-bun@v2

      - name: Publish canary
        if: steps.changes.outputs.skip != 'true'
        run: |
          sha="${{ github.event.workflow_run.head_sha }}"
          short_sha="$(printf '%s' "$sha" | cut -c1-7)"
          version="0.0.0-canary.${short_sha}"
          echo "Publishing sdk canary: $version"
          cd sdk/javascript
          npm pkg set version="$version"
          bun install
          bun run build
          npm publish --tag canary
