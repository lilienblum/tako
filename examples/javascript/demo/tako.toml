name = "bun-example"
runtime = "bun"

[[build_stages]]
name = "sdk"
run = "bun run build"
cwd = "../../../sdk/javascript"

[vars.development]
WIDLCARD_SUFFIX = ".bun-example.tako.test"

[vars.production]
WIDLCARD_SUFFIX = ".bun.tako.sh"

[envs.development]
routes = ["tako-demo.test/foobar", "*.tako-demo.tako.test"]

[envs.production]
routes = ["demo.tako.sh/foobar", "*.demo.tako.sh"]
servers = ["tako-demo"]

[envs.staging]
routes = ["tako-testbed.orb.local/bun", "*.bun.tako-testbed.orb.local"]
servers = ["testbed"]
idle_timeout = 300
