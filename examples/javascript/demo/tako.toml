name = "demo"
runtime = "bun"
preset = "tanstack-start"

[[build_stages]]
name = "sdk"
run = "bun run build"
cwd = "../../../sdk/javascript"

[[build_stages]]
name = "app"
run = "bun run build"

[envs.development]
routes = ["demo.test", "*.demo.test"]

[envs.production]
routes = ["demo.tako.sh", "*.demo.tako.sh"]
servers = ["tako-demo"]
