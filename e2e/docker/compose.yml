services:
  server-ubuntu:
    build:
      context: ../..
      dockerfile: e2e/docker/server/ubuntu.Dockerfile
    volumes:
      - e2e_ssh_keys:/opt/e2e/keys:ro
  server-alma:
    build:
      context: ../..
      dockerfile: e2e/docker/server/alma.Dockerfile
    volumes:
      - e2e_ssh_keys:/opt/e2e/keys:ro
  server-alpine:
    build:
      context: ../..
      dockerfile: e2e/docker/server/alpine.Dockerfile
    volumes:
      - e2e_ssh_keys:/opt/e2e/keys:ro
  runner:
    build:
      context: ../..
      dockerfile: e2e/docker/runner/Dockerfile
    depends_on:
      - server-ubuntu
      - server-alma
      - server-alpine
    volumes:
      - ../..:/workspace:ro
      - e2e_ssh_keys:/opt/e2e/keys
      - ${E2E_BIN_DIR:-.e2e-bin}:/opt/e2e/bin:ro
    working_dir: /workspace

volumes:
  e2e_ssh_keys:
